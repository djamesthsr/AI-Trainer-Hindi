<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ट्रेनर — मॉड्यूल 6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E2626;
    --bg-deep:#0A1D1D;
    --panel:#153636;
    --panel-hi:#1C4444;
    --line:#2A5555;
    --ink:#EAF4F0;
    --ink-dim:#9DC2BA;
    --mint:#6FE3B4;
    --mint-dim:#3E8F76;
    --amber:#F2A65A;
    --rose:#E86A6A;
    --font-display:'Space Grotesk', 'Noto Sans Devanagari', sans-serif;
    --font-body:'Noto Sans Devanagari', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 15% 0%, #133030 0%, var(--bg-deep) 60%);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001s !important; transition-duration:0.001s !important;}
  }
  .shell{
    max-width:1180px;
    margin:0 auto;
    padding:22px 20px 60px;
    display:grid;
    grid-template-columns:220px 1fr;
    gap:26px;
  }
  @media (max-width:860px){
    .shell{grid-template-columns:1fr;}
  }

  .topbar{
    grid-column:1/-1;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 4px 6px;
    border-bottom:1px solid var(--line);
    margin-bottom:4px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
  }
  .brand-mark{
    width:34px;height:34px;border-radius:8px;
    background:conic-gradient(from 210deg, var(--mint), var(--amber), var(--mint));
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono); font-weight:600; font-size:13px; color:#0A1D1D;
  }
  .brand-text .k{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.14em; color:var(--ink-dim); text-transform:uppercase;}
  .brand-text .t{font-family:var(--font-display); font-size:17px; font-weight:600;}
  .stat-row{display:flex; gap:18px; align-items:center;}
  .stat{
    font-family:var(--font-mono); font-size:12.5px; color:var(--ink-dim);
    display:flex; align-items:center; gap:6px;
  }
  .stat b{color:var(--mint); font-size:14px;}
  .stat.acc b{color:var(--amber);}

  .rail{
    display:flex; flex-direction:column; gap:2px;
    position:relative;
    padding-top:6px;
  }
  @media (max-width:860px){
    .rail{
      flex-direction:row; overflow-x:auto; gap:0; padding:4px 0 10px;
    }
  }
  .rail-node{
    display:flex; align-items:center; gap:10px;
    padding:9px 8px; border-radius:9px; cursor:pointer;
    border:1px solid transparent;
    transition:background .15s ease, border-color .15s ease;
    position:relative;
  }
  .rail-node:hover{background:var(--panel);}
  .rail-node.active{background:var(--panel-hi); border-color:var(--mint-dim);}
  .rail-node.locked{cursor:not-allowed; opacity:.4;}
  .rail-dot{
    width:22px;height:22px;border-radius:50%;
    border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono); font-size:10.5px; color:var(--ink-dim);
    flex:none;
  }
  .rail-node.active .rail-dot{border-color:var(--mint); color:var(--mint);}
  .rail-node.done .rail-dot{background:var(--mint); border-color:var(--mint); color:#0A1D1D;}
  .rail-label{font-size:12.5px; color:var(--ink-dim); line-height:1.25;}
  .rail-node.active .rail-label{color:var(--ink); font-weight:600;}
  .rail-line{
    position:absolute; left:19px; top:31px; bottom:-2px; width:1px; background:var(--line);
  }
  @media (max-width:860px){ .rail-line{display:none;} }

  .stage{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:30px 32px 28px;
    min-height:520px;
    position:relative;
    overflow:hidden;
  }
  @media (max-width:600px){ .stage{padding:22px 18px 22px;} }
  .eyebrow{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--mint); margin-bottom:8px; display:flex; align-items:center; gap:8px;
  }
  .eyebrow .dash{width:22px; height:1px; background:var(--mint-dim);}
  h1.stage-title{
    font-family:var(--font-display); font-size:26px; margin:0 0 6px; font-weight:700; letter-spacing:-0.01em;
  }
  .stage-sub{color:var(--ink-dim); font-size:14.5px; margin:0 0 22px; max-width:640px; line-height:1.65;}
  .card{
    background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin-bottom:14px;
  }
  .btn{
    font-family:var(--font-body); font-weight:600; font-size:14px;
    background:var(--mint); color:#0A1D1D; border:none; border-radius:9px;
    padding:11px 20px; cursor:pointer; transition:transform .1s ease, box-shadow .15s ease;
  }
  .btn:hover{ box-shadow:0 0 0 3px rgba(111,227,180,.2); }
  .btn:active{ transform:scale(.97); }
  .btn.ghost{
    background:transparent; color:var(--ink); border:1px solid var(--line);
  }
  .btn.ghost:hover{border-color:var(--mint-dim);}
  .btn:disabled{opacity:.35; cursor:not-allowed; box-shadow:none;}
  .row-actions{display:flex; justify-content:space-between; align-items:center; margin-top:22px; gap:10px; flex-wrap:wrap;}

  .opt{
    display:block; width:100%; text-align:left;
    background:var(--bg); border:1px solid var(--line); color:var(--ink);
    padding:13px 16px; border-radius:10px; margin-bottom:9px; cursor:pointer;
    font-family:var(--font-body); font-size:14.5px; transition:border-color .12s ease, background .12s ease;
  }
  .opt:hover{border-color:var(--mint-dim);}
  .opt.correct{border-color:var(--mint); background:rgba(111,227,180,.08); color:var(--mint);}
  .opt.wrong{border-color:var(--rose); background:rgba(232,106,106,.08); color:var(--rose);}
  .opt.disabled{cursor:default; opacity:.55;}
  .opt.disabled:hover{border-color:var(--line);}

  .feedback{
    font-size:13.5px; padding:10px 14px; border-radius:9px; margin-top:10px; line-height:1.6;
  }
  .feedback.good{background:rgba(111,227,180,.1); border:1px solid var(--mint-dim); color:var(--mint);}
  .feedback.bad{background:rgba(232,106,106,.1); border:1px solid #7a3838; color:var(--rose);}

  .dial-wrap{ display:flex; align-items:center; gap:16px; }
  .dial-num{ font-family:var(--font-mono); }
  .dial-num .v{ font-size:26px; font-weight:600; color:var(--amber); }
  .dial-num .l{ font-size:10.5px; color:var(--ink-dim); letter-spacing:.1em; text-transform:uppercase; }

  .scene{
    border-radius:12px; overflow:hidden; border:1px solid var(--line); margin-bottom:16px;
    background:linear-gradient(160deg, #123232, #0d2727);
  }
  .scene-frame{ padding:26px 24px 20px; display:flex; gap:20px; align-items:center; }
  .scene-icon{ flex:none; width:78px; height:78px; }
  .scene-copy .tag{ font-family:var(--font-mono); font-size:11px; color:var(--ink-dim); letter-spacing:.08em; text-transform:uppercase; }
  .scene-copy .desc{ font-size:15px; margin-top:5px; line-height:1.6; }
  .chapter-track{ display:flex; gap:6px; padding:0 24px 16px; }
  .chapter-tick{ height:4px; flex:1; border-radius:2px; background:var(--line); }
  .chapter-tick.done{ background:var(--mint); }
  .chapter-tick.now{ background:var(--amber); }

  .match-grid{ display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  @media (max-width:640px){ .match-grid{ grid-template-columns:1fr; } }
  .match-col-label{ font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:10px; }
  .chip{
    background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:12px 14px;
    margin-bottom:9px; cursor:pointer; font-size:13.8px; transition:all .12s ease;
  }
  .chip:hover{ border-color:var(--mint-dim); }
  .chip.selected{ border-color:var(--amber); box-shadow:0 0 0 2px rgba(242,166,90,.2); }
  .chip.matched{ border-color:var(--mint); background:rgba(111,227,180,.07); cursor:default; opacity:.85; }
  .chip.shake{ animation:shake .35s; border-color:var(--rose); }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }

  .order-pool{ display:flex; flex-wrap:wrap; gap:9px; margin-bottom:16px; }
  .order-card{
    background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:10px 14px;
    font-size:13.5px; cursor:pointer;
  }
  .order-card:hover{border-color:var(--mint-dim);}
  .order-card.used{ opacity:.25; cursor:default; }
  .order-slots{ display:flex; flex-wrap:wrap; gap:9px; min-height:46px; }
  .order-slot{
    border:1px dashed var(--line); border-radius:9px; padding:10px 14px; font-size:13.5px;
    color:var(--ink-dim); min-width:120px; text-align:center;
  }
  .order-slot.filled{ border-style:solid; border-color:var(--mint); color:var(--mint); background:rgba(111,227,180,.06); }

  .ba-row{ display:flex; gap:30px; align-items:center; justify-content:center; margin:18px 0 6px; flex-wrap:wrap; }
  .ba-item{ text-align:center; }
  .ba-item .lbl{ font-family:var(--font-mono); font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
  .ba-arrow{ font-size:22px; color:var(--mint); }

  .star-row{ display:flex; gap:3px; }
  .star{ font-size:17px; color:var(--line); }
  .star.on{ color:var(--amber); }

  textarea.essay{
    width:100%; background:var(--bg); border:1px solid var(--line); border-radius:10px;
    color:var(--ink); font-family:var(--font-body); font-size:14px; padding:12px 14px;
    min-height:78px; resize:vertical;
  }
  textarea.essay:focus{ outline:none; border-color:var(--mint-dim); }
  label.q-label{ font-size:13.8px; color:var(--ink-dim); display:block; margin-bottom:7px; }

  table.dash-table{ width:100%; border-collapse:collapse; font-size:13.8px; }
  table.dash-table th{ text-align:left; font-family:var(--font-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-dim); padding:6px 10px; border-bottom:1px solid var(--line); }
  table.dash-table td{ padding:10px 10px; border-bottom:1px solid var(--line); }
  .up{ color:var(--mint); }

  .check-list{ list-style:none; padding:0; margin:0; }
  .check-list li{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); font-size:14px; }
  .check-list li:last-child{ border-bottom:none; }
  .check-list .mark{ width:20px;height:20px;border-radius:50%; background:var(--mint); color:#0A1D1D; display:flex; align-items:center; justify-content:center; font-size:12px; flex:none; }

  .badge-stage{ display:flex; flex-direction:column; align-items:center; text-align:center; padding:20px 0 8px; }
  .badge-ring{
    width:150px; height:150px; border-radius:50%;
    background:conic-gradient(from 200deg, var(--mint), var(--amber), var(--mint));
    display:flex; align-items:center; justify-content:center;
    animation:pop .55s cubic-bezier(.2,1.6,.4,1);
    margin-bottom:18px; position:relative;
  }
  .badge-ring::after{
    content:""; position:absolute; inset:9px; border-radius:50%; background:var(--bg-deep);
  }
  .badge-ring .gear{ position:relative; z-index:1; font-size:52px; }
  @keyframes pop{ 0%{ transform:scale(.4); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
  .xp-total{ font-family:var(--font-mono); font-size:15px; color:var(--amber); margin-top:6px; }

  .pill{
    display:inline-block; font-family:var(--font-mono); font-size:11px; padding:3px 10px; border-radius:999px;
    background:var(--panel-hi); color:var(--mint); border:1px solid var(--mint-dim); margin-left:8px;
  }
</style>
</head>
<body>
<div class="shell" id="app"></div>

<script>
/* ============ सामग्री डेटा ============ */

const chapters = [
  { title:"इमेज एकत्र करें", tag:"अध्याय 1 · संग्रह", demo:"छात्र बोतल और नोटबुक की कई तस्वीरें अलग-अलग कोण, दूरी और रोशनी में लेते हैं।", icon:"📸",
    q:"AI को कई उदाहरणों की ज़रूरत क्यों होती है?",
    options:["फ़ाइल को बड़ा बनाने के लिए","पैटर्न और भिन्नताओं को भरोसेमंद ढंग से सीखने के लिए","क्योंकि एक तस्वीर की अनुमति नहीं है"], correct:1,
    good:"बिल्कुल सही — ज़्यादा उदाहरण AI को यह सिखाते हैं कि बोतल या नोटबुक असल में कैसी दिखती है, न कि सिर्फ़ एक तस्वीर।",
    bad:"बिल्कुल नहीं। अतिरिक्त तस्वीरें फ़ाइल के आकार के बारे में नहीं होतीं — वे यह सिखाती हैं कि क्या बदलता है और क्या एक जैसा रहता है।" },
  { title:"क्लासेस बनाएं", tag:"अध्याय 2 · वर्गीकरण", demo:"दो क्लासेस बनाई जाती हैं: 'बोतल' और 'नोटबुक'। हर तस्वीर को इन लेबल किए गए फ़ोल्डर में से किसी एक में रखा जाता है।", icon:"🗂️",
    q:"क्लास क्या होती है?",
    options:["एक समूह/श्रेणी जिसे AI अलग पहचानना सीख रहा है (जैसे बोतल बनाम नोटबुक)","AI के बारे में एक स्कूली पाठ","ट्रेनिंग फ़ोल्डर का आकार"], correct:0,
    good:"सही — क्लास बस वे श्रेणियाँ हैं जिनके बीच मॉडल को चुनना सीखना होता है।",
    bad:"लगभग सही, लेकिन यहाँ क्लास का मतलब है एक लेबल की गई श्रेणी, जैसे 'बोतल' या 'नोटबुक'।" },
  { title:"मॉडल को ट्रेन करें", tag:"अध्याय 3 · प्रशिक्षण", demo:"क्लासिफ़ायर हर लेबल की गई तस्वीर को स्कैन करना शुरू करता है, और ऐसे आकार, किनारे और रंग खोजता है जो दोनों क्लासेस को अलग करते हैं।", icon:"⚙️",
    q:"AI अभी क्या कर रहा है?",
    options:["तस्वीरों की हूबहू नकल कर रहा है","बोतल और नोटबुक को अलग करने वाले पैटर्न खोज रहा है","खराब तस्वीरों को खुद-ब-खुद हटा रहा है"], correct:1,
    good:"सही — ट्रेनिंग पैटर्न खोजने की प्रक्रिया है, न कि याद करने या फ़ाइल करने की।",
    bad:"बिल्कुल नहीं — ट्रेनिंग के दौरान तस्वीरें न तो कॉपी होती हैं न डिलीट, यह अलग करने वाले पैटर्न खोजने की प्रक्रिया है।" },
  { title:"मॉडल का परीक्षण करें", tag:"अध्याय 4 · परीक्षण", demo:"एक बिल्कुल नई बोतल की तस्वीर मॉडल को दिखाई जाती है। यह सही ढंग से उच्च विश्वास के साथ 'बोतल' का अनुमान लगाता है।", icon:"✅",
    q:"AI सफल क्यों हुआ?",
    options:["उसने बेतरतीब अंदाज़ा लगाया और भाग्यशाली रहा","उसने ट्रेनिंग तस्वीरों जैसे मिलते-जुलते पैटर्न पहचाने","उसने टेस्ट तस्वीर को हूबहू याद कर लिया"], correct:1,
    good:"हाँ — सफलता जाने-पहचाने पैटर्न पहचानने से आती है, भाग्य या याद रखने से नहीं।",
    bad:"बिल्कुल नहीं — यहाँ सही अनुमान ट्रेनिंग के दौरान बने पैटर्न पहचान से आता है।" },
  { title:"फेल्योर टेस्ट", tag:"अध्याय 5 · असफलता", demo:"एक नोटबुक की तस्वीर, जो एक नए और अस्त-व्यस्त बैकग्राउंड में ली गई है, गलती से 'बोतल' के रूप में वर्गीकृत हो जाती है।", icon:"⚠️",
    q:"AI असफल क्यों हुआ?",
    options:["नई तस्वीर ट्रेनिंग उदाहरणों से बहुत अलग दिखी","AI थक गया","कैमरा खराब हो गया"], correct:0,
    good:"सही — जब कोई असली तस्वीर ट्रेनिंग में देखी गई किसी भी चीज़ से बहुत अलग होती है, तो अनुमान गलत हो सकते हैं।",
    bad:"बिल्कुल नहीं — AI न तो थकता है न उपकरण खराब होता है। यह तब असफल होता है जब इनपुट सीखी गई चीज़ों से अलग होता है।" },
  { title:"मॉडल को बेहतर बनाएं", tag:"अध्याय 6 · सुधार", demo:"ट्रेनर अलग रोशनी, कोण और बैकग्राउंड वाली और भी विविध तस्वीरें जोड़ता है, और मॉडल को फिर से ट्रेन करता है।", icon:"📈",
    q:"सटीकता में सुधार किससे हुआ?",
    options:["AI को बंद करके फिर चालू करने से","बेहतर और अधिक विविध ट्रेनिंग तस्वीरें जोड़ने से","बिना किसी बदलाव के इंतज़ार करने से"], correct:1,
    good:"सही — बेहतर, अधिक विविध डेटा से ही असल में सटीकता में सुधार होता है।",
    bad:"बिल्कुल नहीं — सटीकता समृद्ध ट्रेनिंग डेटा से सुधरती है, इंतज़ार करने या रीस्टार्ट करने से नहीं।" },
];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
state.causeOrder = shuffle(failurePairs.map(p=>p.cause));

function goTo(i){
  if(i>state.furthest) return;
  state.screen=i;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}
function advance(){
  state.screen++;
  if(state.screen>state.furthest) state.furthest=state.screen;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}
function addXP(n){ state.xp += n; }

function railHTML(){
  return `<div class="rail">${screens.map((s,i)=>{
    const cls = i===state.screen ? 'active' : (i>state.furthest ? 'locked':'');
    const done = i<state.screen ? 'done' : '';
    return `<div class="rail-node ${cls} ${done}" onclick="goTo(${i})">
      <div class="rail-dot">${i<state.screen?'✓':(i+1)}</div>
      <div class="rail-label">${s}</div>
    </div>`;
  }).join('')}</div>`;
}

function dialSVG(pct, size=64){
  const r=26, c=2*Math.PI*r;
  const off = c - (c*Math.min(Math.max(pct,0),100)/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="${r}" fill="none" stroke="#2A5555" stroke-width="6"/>
    <circle cx="32" cy="32" r="${r}" fill="none" stroke="#F2A65A" stroke-width="6"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      transform="rotate(-90 32 32)" style="transition:stroke-dashoffset .6s ease"/>
    <text x="32" y="37" text-anchor="middle" font-family="IBM Plex Mono" font-size="13" fill="#EAF4F0" font-weight="600">${Math.round(pct)}</text>
  </svg>`;
}

}

function renderKC(){
  const done = state.kcIdx >= kcQuestions.length;
  if(done){
    const pct = Math.round((state.kcCorrectCount/kcQuestions.length)*100);
    const passed = pct>=75;
    return `
    <div class="eyebrow"><span class="dash"></span>नॉलेज चेक · परिणाम</div>
    <h1 class="stage-title">${pct}% सही</h1>
    <p class="stage-sub">${passed ? "यह 80% मिशन आवश्यकता को पूरा करता है।" : "आप 80% मिशन आवश्यकता से थोड़ा नीचे हैं — कोई बात नहीं, आगे का लैब कार्य इसे मज़बूत करेगा।"}</p>
    <div class="row-actions"><span></span><button class="btn" onclick="finishKC()">ट्रेनिंग चैलेंज में प्रवेश करें →</button></div>`;
  }
  const q = kcQuestions[state.kcIdx];
  return `
  <div class="eyebrow"><span class="dash"></span>नॉलेज चेक</div>
  <h1 class="stage-title">प्रश्न ${state.kcIdx+1} में से ${kcQuestions.length}</h1>
  <div class="card">
    <div style="font-weight:600; margin-bottom:12px;">${q.q}</div>
    ${q.options.map((o,i)=>{
      let cls='opt';
      if(state.kcAnswered){
        cls += (i===q.correct)?' correct':(i===state.kcSelected?' wrong':'');
        cls += ' disabled';
      }
      return `<button class="${cls}" ${state.kcAnswered?'':`onclick="answerKC(${i})"`}>${o}</button>`;
    }).join('')}
  </div>
  <div class="row-actions">
    <span style="color:var(--ink-dim); font-size:13px;">अब तक स्कोर: ${state.kcCorrectCount}/${state.kcIdx}</span>
    <button class="btn" ${state.kcAnswered?'':'disabled'} onclick="nextKC()">${state.kcIdx===kcQuestions.length-1?'परिणाम देखें':'अगला'} →</button>
  </div>`;
}
function answerKC(i){
  const q = kcQuestions[state.kcIdx];
  state.kcAnswered=true; state.kcSelected=i;
  if(i===q.correct) state.kcCorrectCount++;
  render();
}
function nextKC(){ state.kcIdx++; state.kcAnswered=false; state.kcSelected=null; render(); }
function finishKC(){
  if(state.kcCorrectCount===kcQuestions.length){ addXP(20); state.perfectKC=true; }
  state.accuracy=55;
  advance();
}

function renderChallenge(){
  const done = state.roundIdx >= rounds.length;
  if(done){
    return `
    <div class="eyebrow"><span class="dash"></span>गतिविधि 2 · परिणाम</div>
    <h1 class="stage-title">मॉडल को ${Math.round(state.accuracy)}% तक ट्यून किया गया</h1>
    <p class="stage-sub">हर अच्छे ट्रेनिंग निर्णय ने सटीकता को ऊपर बढ़ाया। यहां देखें क्या काम आया:</p>
    <table class="dash-table">
      <thead><tr><th>ट्रेनिंग निर्णय</th><th>परिणाम</th></tr></thead>
      <tbody>
        <tr><td>ज़्यादा तस्वीरें</td><td class="up">सटीकता ↑</td></tr>
        <tr><td>संतुलित क्लासेस</td><td class="up">सटीकता ↑</td></tr>
        <tr><td>बेहतर रोशनी</td><td class="up">सटीकता ↑</td></tr>
        <tr><td>ज़्यादा विविधता</td><td class="up">सटीकता ↑</td></tr>
      </tbody>
    </table>
    <div class="row-actions"><span></span><button class="btn" onclick="advance()">असफलताओं की जांच करें →</button></div>`;
  }
  const r = rounds[state.roundIdx];
  return `
  <div class="eyebrow"><span class="dash"></span>गतिविधि 2 · अपने AI असिस्टेंट को ट्रेन करें</div>
  <h1 class="stage-title">${r.title}</h1>
  <div class="dial-wrap card" style="align-items:center;">
    ${dialSVG(state.accuracy,64)}
    <div class="dial-num"><div class="v">${Math.round(state.accuracy)}%</div><div class="l">वर्तमान सटीकता</div></div>
  </div>
  <div class="card">
    <div style="font-weight:600; margin-bottom:12px;">${r.prompt}</div>
    ${r.options.map((o,i)=>{
      let cls='opt';
      if(state.roundAnswered){
        if(i===r.correct) cls+=' correct';
        else if(i===state.roundSelected) cls+=' wrong';
      }
      return `<button class="${cls}" onclick="answerRound(${i})">${o}</button>`;
    }).join('')}
    ${state.roundAnswered ? `<div class="feedback ${state.roundSelected===r.correct?'good':'bad'}">${state.roundSelected===r.correct?r.good:r.bad}</div>`:''}
  </div>
  <div class="row-actions">
    <span style="color:var(--ink-dim); font-size:13px;">राउंड ${state.roundIdx+1} में से ${rounds.length}</span>
    <button class="btn" ${(state.roundAnswered && state.roundSelected===r.correct)?'':'disabled'} onclick="nextRound()">जारी रखें →</button>
  </div>`;
}
function answerRound(i){
  const r = rounds[state.roundIdx];
  state.roundAnswered=true; state.roundSelected=i;
  if(i===r.correct){ state.accuracy = Math.min(95, state.accuracy+10); }
  render();
}
function nextRound(){ state.roundIdx++; state.roundAnswered=false; state.roundSelected=null; render(); }

function renderInvestigation(){
  const allMatched = state.matchedPairs.length===failurePairs.length;
  if(!state.orderStage){
    return `
    <div class="eyebrow"><span class="dash"></span>गतिविधि 3 · AI फेल्योर इन्वेस्टिगेशन</div>
    <h1 class="stage-title">हर असफलता को उसके कारण से मिलाएं</h1>
    <p class="stage-sub">बाईं ओर से एक अनुमान चुनें, फिर दाईं ओर उसका कारण चुनें।</p>
    <div class="match-grid">
      <div>
        <div class="match-col-label">AI अनुमान</div>
        ${failurePairs.map(p=>{
          const matched = state.matchedPairs.includes(p.pred);
          const sel = state.matchSelectedPred===p.pred;
          return `<div class="chip ${matched?'matched':''} ${sel?'selected':''} ${state.shakeChip===p.pred?'shake':''}" onclick="${matched?'':`pickPred('${p.pred.replace(/'/g,"\\'")}')`}">${p.pred}</div>`;
        }).join('')}
      </div>
      <div>
        <div class="match-col-label">मूल कारण</div>
        ${state.causeOrder.map(c=>{
          const matched = failurePairs.some(p=>state.matchedPairs.includes(p.pred) && p.cause===c);
          const sel = state.matchSelectedCause===c;
          return `<div class="chip ${matched?'matched':''} ${sel?'selected':''} ${state.shakeChip===c?'shake':''}" onclick="${matched?'':`pickCause('${c.replace(/'/g,"\\'")}')`}">${c}</div>`;
        }).join('')}
      </div>
    </div>
    <div class="row-actions">
      <span style="color:var(--ink-dim); font-size:13px;">${failurePairs.length} में से ${state.matchedPairs.length} मिलान हुए · गलतियां: ${state.mistakesInMatch}</span>
      <button class="btn" ${allMatched?'':'disabled'} onclick="startOrderStage()">जारी रखें →</button>
    </div>`;
  } else if(!state.baAnimated){
    const built = state.orderBuilt.length===orderCorrect.length;
    return `
    <div class="eyebrow"><span class="dash"></span>गतिविधि 3 · सुधार रणनीति</div>
    <h1 class="stage-title">सुधार क्रम बनाएं</h1>
    <p class="stage-sub">जिस क्रम में आप उन्हें लागू करेंगे, उसी क्रम में कार्ड्स पर टैप करें। यहां एक कार्ड असल में मदद नहीं करेगा — उसे छोड़ दें।</p>
    <div class="card">
      <div class="match-col-label">उपलब्ध कार्ड्स</div>
      <div class="order-pool">
        ${orderPool.map(c=>{
          const used = state.orderBuilt.includes(c);
          return `<div class="order-card ${used?'used':''}" onclick="${used?'':`pickOrder('${c}')`}">${c}</div>`;
        }).join('')}
      </div>
      <div class="match-col-label">आपका क्रम</div>
      <div class="order-slots">
        ${orderCorrect.map((_,i)=>{
          const val = state.orderBuilt[i];
          return `<div class="order-slot ${val?'filled':''}">${val?val:'—'}</div>`;
        }).join('')}
      </div>
      ${state.orderMsg?`<div class="feedback ${state.orderMsgGood?'good':'bad'}">${state.orderMsg}</div>`:''}
    </div>
    <div class="row-actions">
      <span style="color:var(--ink-dim); font-size:13px;">${orderCorrect.length} में से ${state.orderBuilt.length} रखे गए</span>
      <button class="btn" ${built?'':'disabled'} onclick="playBeforeAfter()">सुधार चलाएं →</button>
    </div>`;
  } else {
    return `
    <div class="eyebrow"><span class="dash"></span>गतिविधि 3 · परिणाम</div>
    <h1 class="stage-title">सुधार के बाद सटीकता</h1>
    <div class="ba-row">
      <div class="ba-item"><div class="lbl">पहले</div>${dialSVG(56,90)}</div>
      <div class="ba-arrow">→</div>
      <div class="ba-item"><div class="lbl">बाद में</div>${dialSVG(94,90)}</div>
    </div>
    <div class="card">
      <div style="font-weight:600; margin-bottom:6px;">सटीकता क्यों सुधरी?</div>
      <p style="color:var(--ink-dim); font-size:14px; line-height:1.6; margin:0;">ज़्यादा तस्वीरों, बेहतर रोशनी, ज़्यादा कोणों, एक संतुलित डेटासेट, और खराब गुणवत्ता वाली तस्वीरों को हटाने से मॉडल को सीखने के लिए साफ़ और अधिक प्रतिनिधि पैटर्न मिले — गलतियों को अनदेखा करने के बजाय, आपने उनके मूल कारणों को ठीक किया।</p>
    </div>
    <div class="row-actions"><span></span><button class="btn" onclick="advance()">अपनी रिपोर्ट लिखें →</button></div>`;
  }
}
function pickPred(p){ state.matchSelectedPred=p; tryMatch(); render(); }
function pickCause(c){ state.matchSelectedCause=c; tryMatch(); render(); }
function tryMatch(){
  if(!state.matchSelectedPred || !state.matchSelectedCause) return;
  const pair = failurePairs.find(p=>p.pred===state.matchSelectedPred);
  if(pair.cause===state.matchSelectedCause){
    state.matchedPairs.push(state.matchSelectedPred);
  } else {
    state.mistakesInMatch++;
    state.perfectInvestigation=false;
    state.shakeChip = state.matchSelectedPred;
    setTimeout(()=>{ state.shakeChip=null; render(); }, 350);
  }
  state.matchSelectedPred=null; state.matchSelectedCause=null;
}
function startOrderStage(){ state.orderStage=true; render(); }
function pickOrder(c){
  const next = orderCorrect[state.orderBuilt.length];
  if(c==="गलतियों को अनदेखा करें"){
    state.orderMsg="गलतियों को अनदेखा करने से मॉडल नहीं सुधरेगा — कोई असली सुधार रणनीति चुनें।";
    state.orderMsgGood=false; render(); return;
  }
  if(c===next){
    state.orderBuilt.push(c);
    state.orderMsg="बढ़िया — यह सही अगला कदम है।";
    state.orderMsgGood=true;
  } else {
    state.orderMsg=`अभी नहीं — वह कदम आज़माएं जो तार्किक रूप से "${c}" से पहले आता है।`;
    state.orderMsgGood=false;
  }
  render();
}
function playBeforeAfter(){
  state.baAnimated=true;
  if(state.perfectInvestigation){ addXP(20); }
  render();
}

function renderReport(){
  const filled = state.essays.every(e=>e.trim().length>0);
  return `
  <div class="eyebrow"><span class="dash"></span>गतिविधि 4 · मॉडल सुधार रिपोर्ट</div>
  <h1 class="stage-title">AI ट्रेनर परफॉरमेंस रिपोर्ट</h1>
  <p class="stage-sub">आपके प्रमाणीकरण से पहले कुछ छोटे विचार।</p>
  ${reflectionQs.map((q,i)=>`
    <div class="card">
      <label class="q-label">${q}</label>
      <textarea class="essay" oninput="updateEssay(${i}, this.value)" placeholder="अपना उत्तर लिखें...">${state.essays[i]}</textarea>
    </div>`).join('')}
  <div class="row-actions">
    <span id="essay-progress" style="color:var(--ink-dim); font-size:13px;">${reflectionQs.length} में से ${state.essays.filter(e=>e.trim()).length} उत्तर दिए गए</span>
    <button id="submit-report-btn" class="btn" ${filled?'':'disabled'} onclick="submitReport()">रिफ्लेक्शन सबमिट करें →</button>
  </div>`;
}
function updateEssay(i,val){
  state.essays[i]=val;
  const answeredCount = state.essays.filter(e=>e.trim().length>0).length;
  const progressEl = document.getElementById('essay-progress');
  if(progressEl) progressEl.textContent = `${reflectionQs.length} में से ${answeredCount} उत्तर दिए गए`;
  const btn = document.getElementById('submit-report-btn');
  if(btn) btn.disabled = answeredCount < reflectionQs.length;
}
function submitReport(){ advance(); }

function renderDashboard(){
  if(!state.starsAnimated) state.starsAnimated=true;
  return `
  <div class="eyebrow"><span class="dash"></span>गतिविधि 4 · परफॉरमेंस डैशबोर्ड</div>
  <h1 class="stage-title">आपकी ट्रेनर रिपोर्ट</h1>
  <div class="card">
    ${ratings.map(r=>`
      <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line);">
        <span style="font-size:14px;">${r.cat}</span>
        <span class="star-row">${Array.from({length:5},(_,i)=>`<span class="star ${i<r.stars?'on':''}">★</span>`).join('')}</span>
      </div>`).join('')}
  </div>
  <div class="card">
    <div style="font-weight:600; margin-bottom:10px;">अंतिम चैलेंज: कौन सा डेटासेट बेहतर मॉडल बनाता है?</div>
    <div class="match-grid">
      <div class="opt" style="cursor:pointer;" onclick="pickFinal('A')">
        <b>डेटासेट A</b><br><span style="color:var(--ink-dim); font-size:13px;">12 बोतल तस्वीरें · अलग-अलग रोशनी · कई कोण · अलग-अलग बैकग्राउंड</span>
      </div>
      <div class="opt" style="cursor:pointer;" onclick="pickFinal('B')">
        <b>डेटासेट B</b><br><span style="color:var(--ink-dim); font-size:13px;">12 एक जैसी बोतल तस्वीरें</span>
      </div>
    </div>
    ${state.finalChoice ? `<div class="feedback ${state.finalChoice==='A'?'good':'bad'}">${state.finalChoice==='A' ? "सही — डेटासेट A की विविधता मॉडल को असल दुनिया की परिस्थितियों में बोतल पहचानना सिखाती है, न कि सिर्फ़ एक तयशुदा मुद्रा में।" : "डेटासेट B व्यवस्थित लगता है, लेकिन 12 एक जैसी तस्वीरें मॉडल को यह लगभग कुछ नहीं सिखातीं कि असल दुनिया में बोतलें कैसे अलग-अलग दिखती हैं। डेटासेट A बेहतर विकल्प है।"}</div>`:''}
  </div>
  <div class="row-actions">
    <span></span>
    <button class="btn" ${state.finalChoice?'':'disabled'} onclick="advance()">प्रमाणीकरण अनलॉक करें →</button>
  </div>`;
}
function pickFinal(v){ state.finalChoice=v; render(); }

function renderBadge(){
  if(!state.badgeAwarded){ state.badgeAwarded=true; addXP(100); }
  const reqs = [
    "मिशन ब्रीफ देखा गया",
    "ट्रेनिंग वीडियो 100% पूरा हुआ",
    "नॉलेज चेक पूरा किया गया",
    "AI ट्रेनिंग चैलेंज पूरा हुआ",
    "फेल्योर इन्वेस्टिगेशन पूरा हुआ",
    "रिफ्लेक्शन सबमिट किया गया",
  ];
  return `
  <div class="eyebrow"><span class="dash"></span>मिशन पूर्ण</div>
  <h1 class="stage-title">प्रमाणीकरण डैशबोर्ड</h1>
  <ul class="check-list">
    ${reqs.map(r=>`<li><span class="mark">✓</span>${r}</li>`).join('')}
  </ul>
  <div class="badge-stage">
    <div class="badge-ring"><span class="gear">⚙️</span></div>
    <div style="font-family:var(--font-display); font-weight:700; font-size:19px;">AI ट्रेनर बैज अनलॉक हुआ</div>
    <div class="xp-total">कुल अर्जित XP: ${state.xp}${state.perfectKC?' <span class="pill">+20 परफेक्ट KC</span>':''}${state.perfectInvestigation?' <span class="pill">+20 क्लीन इन्वेस्टिगेशन</span>':''}</div>
    <p style="color:var(--ink-dim); font-size:13.5px; max-width:440px; margin-top:14px;">मिशन 7 अपने आप अनलॉक हो जाता है। अब आप एक सटीक AI सिस्टम बनाने से आगे बढ़कर यह सवाल पूछ रहे हैं कि क्या इसका इस्तेमाल होना चाहिए — और इसे ज़िम्मेदारी से कैसे इस्तेमाल किया जाए।</p>
  </div>`;
}

/* ============ मुख्य रेंडर ============ */
function render(){
  const app = document.getElementById('app');
  let body;
  switch(state.screen){
    case 0: body=renderBrief(); break;
    case 1: body=renderVideo(); break;
    case 2: body=renderKC(); break;
    case 3: body=renderChallenge(); break;
    case 4: body=renderInvestigation(); break;
    case 5: body=renderReport(); break;
    case 6: body=renderDashboard(); break;
    case 7: body=renderBadge(); break;
  }
  app.innerHTML = topbarHTML() + railHTML() + `<div class="stage">${body}</div>`;
}
render();
</script>
</body>
</html>
